services:
  db:
    image: mysql:8.0
    container_name: onlyjobs-db
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: onlyjobs
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/onlyjobs.sql:/docker-entrypoint-initdb.d/onlyjobs.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: onlyjobs-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql+pymysql://root@db:3306/onlyjobs"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: onlyjobs-frontend
    restart: unless-stopped
    ports:
      - "4201:4200"
    depends_on:
      - backend

volumes:
  db_data:
