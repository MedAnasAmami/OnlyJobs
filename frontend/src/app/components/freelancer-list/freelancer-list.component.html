<section>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">
      <i class="bi bi-people-fill text-primary me-2"></i>Nos Freelancers
    </h2>
    <span class="badge bg-primary fs-6">{{ freelancers().length }} freelancer{{ freelancers().length > 1 ? 's' : '' }}</span>
  </div>

  <div class="row g-4">
    @if (loading()) {
      <div class="text-center py-5 w-100">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-2 text-muted">Chargement des freelancers...</p>
      </div>
    } @else if (freelancers().length === 0) {
      <div class="text-center py-5 w-100">
        <i class="bi bi-search display-1 text-muted"></i>
        <p class="mt-3 text-muted">Aucun freelancer trouve</p>
      </div>
    } @else {
      @for (freelancer of freelancers(); track freelancer.id) {
        <app-freelancer-card
          [freelancer]="freelancer"
          [index]="$index"
          (viewDetail)="onViewDetail($event)">
        </app-freelancer-card>
      }
    }
  </div>
</section>
