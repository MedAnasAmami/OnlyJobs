<section>
  <h2 class="fw-bold mb-4">
    <i class="bi bi-bar-chart-fill text-primary me-2"></i>Statistiques de la Plateforme
  </h2>

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
      <p class="mt-2 text-muted">Chargement des statistiques...</p>
    </div>
  } @else {
    <div class="row g-4">
      @for (stat of statsCards(); track $index) {
        <div class="col-lg-4 col-md-6">
          <div class="stat-card bg-white fade-in-up" [style.animation-delay]="$index * 0.1 + 's'">
            <div class="stat-icon text-{{ stat.color }}">
              <i class="bi {{ stat.icon }}"></i>
            </div>
            <div class="stat-value">{{ stat.value }}</div>
            <div class="stat-label">{{ stat.label }}</div>
          </div>
        </div>
      }
    </div>
  }
</section>
