<div class="modal fade" id="registerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">
          <i class="bi bi-person-plus me-2"></i>Inscription
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control" [(ngModel)]="nom" name="nom" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Telephone</label>
            <input type="tel" class="form-control" [(ngModel)]="telephone" name="telephone" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" class="form-control" [(ngModel)]="motDePasse" name="motDePasse" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Je suis un</label>
            <select class="form-select" [(ngModel)]="role" name="role">
              <option value="client">Client</option>
              <option value="freelancer">Freelancer</option>
            </select>
          </div>
          @if (error()) {
            <div class="alert alert-danger">{{ error() }}</div>
          }
          @if (success()) {
            <div class="alert alert-success">{{ success() }}</div>
          }
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button
          type="button"
          class="btn btn-success"
          (click)="register()"
          [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-person-plus me-1"></i>S'inscrire
        </button>
      </div>
    </div>
  </div>
</div>
