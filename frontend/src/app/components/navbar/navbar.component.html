<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">
      <i class="bi bi-briefcase-fill me-2"></i>OnlyJobs
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'freelancers'" href="#" (click)="changeSection('freelancers'); $event.preventDefault()">
            <i class="bi bi-people me-1"></i>Freelancers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'annonces'" href="#" (click)="changeSection('annonces'); $event.preventDefault()">
            <i class="bi bi-megaphone me-1"></i>Annonces
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'stats'" href="#" (click)="changeSection('stats'); $event.preventDefault()">
            <i class="bi bi-bar-chart me-1"></i>Statistiques
          </a>
        </li>
      </ul>

      <!-- Search Bar -->
      <div class="search-container me-3">
        <div class="input-group">
          <input
            type="text"
            class="form-control search-input"
            placeholder="Rechercher..."
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            (input)="onSearch()">
          @if (searchQuery) {
            <button class="btn btn-outline-light" type="button" (click)="clearSearch()">
              <i class="bi bi-x-lg"></i>
            </button>
          }
          <button class="btn btn-light" type="button" (click)="onSearch()">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>

      <div class="d-flex align-items-center">
        @if (authService.isLoggedIn()) {
          <span class="text-light me-3">
            <i class="bi bi-person-circle me-1"></i>
            {{ authService.currentUser()?.nom }}
            <span class="badge bg-light text-primary ms-1">{{ authService.currentUser()?.role }}</span>
          </span>
          @if (authService.isFreelancer()) {
            <button class="btn btn-outline-light me-2" (click)="changeSection('profile')">
              <i class="bi bi-pencil-square me-1"></i>Mon Profil
            </button>
          }
          <button class="btn btn-outline-light" (click)="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Deconnexion
          </button>
        } @else {
          <button class="btn btn-outline-light me-2" (click)="openLogin.emit()">
            <i class="bi bi-box-arrow-in-right me-1"></i>Connexion
          </button>
          <button class="btn btn-light" (click)="openRegister.emit()">
            <i class="bi bi-person-plus me-1"></i>Inscription
          </button>
        }
      </div>
    </div>
  </div>
</nav>
